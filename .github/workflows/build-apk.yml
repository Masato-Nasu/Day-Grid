name: Build and publish installable APK

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Build installable APK
        run: gradle assembleDebug --no-daemon

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk DayGrid-v0.1.1.apk

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: DayGrid-v0.1.1-APK
          path: DayGrid-v0.1.1.apk
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view v0.1.1 >/dev/null 2>&1; then
            gh release upload v0.1.1 DayGrid-v0.1.1.apk --clobber
          else
            gh release create v0.1.1 DayGrid-v0.1.1.apk \
              --title "DayGrid v0.1.1" \
              --notes "Installable Android widget APK. Download DayGrid-v0.1.1.apk and open it on an Android device to install."
          fi
